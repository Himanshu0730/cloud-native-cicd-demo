apiVersion: apps/v1
kind: Deployment
metadata:
  name: development-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dev-app
  template:
    metadata:
      labels:
        app: dev-app
    spec:
      containers:
      - name: dev-container
    image: ghcr.io/Himanshu0730/cloud-native-cicd-demo/hello-cloudbuild-dev:latest
        ports:
        - containerPort: 8080
