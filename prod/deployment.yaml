apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: production-app
  template:
    metadata:
      labels:
        app: production-app
    spec:
      containers:
      - name: production-containerimage: ghcr.io/Himanshu0730/cloud-native-cicd-demo/hello-cloudbuild:latest
        ports:
        - containerPort: 8080
